name: Critical Gate
description: Run Critical Gate against the current GitHub Actions diff.
author: Critical Gate

inputs:
  task:
    description: Task intent, issue summary, PR title, or prompt that explains the change.
    required: true
  base:
    description: Git baseline ref or SHA to compare against.
    required: false
    default: origin/main
  format:
    description: "Report format to emit: json, markdown, sarif, or repair."
    required: false
    default: sarif
  output:
    description: Report file path, relative to the checked-out repository.
    required: false
    default: critical-gate.sarif
  version:
    description: Critical Gate npm package version to run. Use "local" only for checked-out source or smoke-tested prebuilt action artifacts.
    required: false
    default: "2.4.3"
  fail-on:
    description: "Minimum severity that fails the gate: blocker, high, or medium."
    required: false
    default: ""
  strict:
    description: Pass --strict through to the CLI.
    required: false
    default: "false"
  install:
    description: Install action package dependencies with pnpm when version is "local". Ignored for npm package runs.
    required: false
    default: "true"
  build:
    description: Build the action package when version is "local". Ignored for npm package runs.
    required: false
    default: "true"

outputs:
  report-path:
    description: Path to the generated Critical Gate report.
    value: ${{ steps.meta.outputs.report-path }}

runs:
  using: composite
  steps:
    - id: meta
      shell: bash
      run: echo "report-path=${{ inputs.output }}" >> "$GITHUB_OUTPUT"

    - name: Prepare local Critical Gate
      if: ${{ inputs.version == 'local' }}
      shell: bash
      run: |
        set -euo pipefail

        corepack enable

        if [ "${{ inputs.install }}" = "true" ]; then
          pnpm --dir "$GITHUB_ACTION_PATH" install --frozen-lockfile
        fi

        if [ "${{ inputs.build }}" = "true" ] || [ ! -f "$GITHUB_ACTION_PATH/dist/cli.js" ]; then
          pnpm --dir "$GITHUB_ACTION_PATH" build
        fi

    - name: Select npm Critical Gate
      if: ${{ inputs.version != 'local' }}
      shell: bash
      run: echo "Using critical-gate@${{ inputs.version }} from npm."

    - name: Run Critical Gate
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        CRITICAL_GATE_VERSION: ${{ inputs.version }}
        CRITICAL_GATE_TASK: ${{ inputs.task }}
        CRITICAL_GATE_BASE: ${{ inputs.base }}
        CRITICAL_GATE_FORMAT: ${{ inputs.format }}
        CRITICAL_GATE_OUTPUT: ${{ inputs.output }}
        CRITICAL_GATE_FAIL_ON: ${{ inputs.fail-on }}
        CRITICAL_GATE_STRICT: ${{ inputs.strict }}
      run: |
        set -euo pipefail

        if [ -z "$CRITICAL_GATE_TASK" ]; then
          echo "::error::critical-gate requires a non-empty task input."
          exit 2
        fi

        mkdir -p "$(dirname "$CRITICAL_GATE_OUTPUT")"

        args=(
          check
          --task "$CRITICAL_GATE_TASK"
          --format "$CRITICAL_GATE_FORMAT"
          --output "$CRITICAL_GATE_OUTPUT"
        )

        if [ -n "$CRITICAL_GATE_BASE" ] && [[ ! "$CRITICAL_GATE_BASE" =~ ^0+$ ]]; then
          args+=(--base "$CRITICAL_GATE_BASE")
        fi

        if [ -n "$CRITICAL_GATE_FAIL_ON" ]; then
          args+=(--fail-on "$CRITICAL_GATE_FAIL_ON")
        fi

        if [ "$CRITICAL_GATE_STRICT" = "true" ]; then
          args+=(--strict)
        fi

        if [ "$CRITICAL_GATE_VERSION" = "local" ]; then
          node "$GITHUB_ACTION_PATH/dist/cli.js" "${args[@]}"
        else
          npx --yes "critical-gate@$CRITICAL_GATE_VERSION" "${args[@]}"
        fi
