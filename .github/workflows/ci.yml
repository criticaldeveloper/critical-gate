name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify Node ${{ matrix.node-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        node-version:
          - 22
          - 24

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm verify

  windows-cli-smoke:
    name: Windows CLI smoke
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm build

      - name: Smoke CLI help
        run: node dist/cli.js --help

      - name: Smoke CLI report output path
        shell: pwsh
        run: node dist/cli.js check --task "Windows CLI path smoke" --base HEAD --format json --output "artifacts\ci\windows-smoke.json"

  quality-evidence:
    name: Coverage and evaluation evidence
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run coverage
        run: pnpm coverage

      - name: Run evaluation
        run: pnpm evaluate

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: critical-gate-coverage
          path: |
            coverage/index.html
            coverage/coverage-summary.json
          if-no-files-found: error

      - name: Upload evaluation artifact
        uses: actions/upload-artifact@v6
        with:
          name: critical-gate-evaluation
          path: |
            artifacts/evaluation/critical-gate-evaluation.json
            artifacts/evaluation/critical-gate-evaluation.md
          if-no-files-found: error
